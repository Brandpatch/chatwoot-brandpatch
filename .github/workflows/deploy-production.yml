name: CD - Chatwoot Production Environment

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download source code
        uses: actions/checkout@v4

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile and Push Production Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/brandpatch/chatwoot-brandpatch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      # 1. Descargar el código fuente en el runner para que SCP pueda leer docker-compose y la carpeta de logos
      - name: Download source code for deployment
        uses: actions/checkout@v4

      # 2. Copiar de forma segura el docker-compose.yaml actualizado y tus logos a la carpeta de producción en AWS
      - name: Copy files to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          source: "docker-compose.yaml,custom-brand/"
          target: "~/chatwoot"

      # 3. Conectarse por SSH a la máquina de producción únicamente para ordenar el refresco de contenedores
      - name: Update AWS Prod Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            cd ~/chatwoot
            echo "${{ secrets.GHCR_DEPLOY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull rails sidekiq
            docker compose up -d
            docker logout ghcr.io
