name: CD - Chatwoot Development Environment

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Download source code
        uses: actions/checkout@v4

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile and Push Development Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/brandpatch/chatwoot-brandpatch:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Development
    steps:
      # 1. Descargar el código fuente en el runner de GitHub para poder acceder a los archivos locales
      - name: Download source code for deployment
        uses: actions/checkout@v4

      # 2. Copiar directamente el docker-compose.yaml y la carpeta de logos al disco de AWS por SCP
      - name: Copy files to AWS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          source: "docker-compose.yaml,custom-brand/"
          target: "~/chatwoot"

      # 3. Conectarse por SSH únicamente a ordenar a Docker que refresque los contenedores
      - name: Update AWS Dev Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            cd ~/chatwoot
            echo "${{ secrets.GHCR_DEPLOY_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull rails sidekiq
            docker compose up -d
            docker logout ghcr.io
